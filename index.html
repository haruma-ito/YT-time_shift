<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TIMESHIFT">
<link rel="manifest" href="manifest.json">
<title>TIMESHIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #f7f3ec;
  --bg2:       #ede8df;
  --bg3:       #e3ddd3;
  --surface:   #ffffff;
  --border:    #d4ccbc;
  --border2:   #c4bba8;
  --ink:       #2a2520;
  --ink2:      #6b6258;
  --ink3:      #a09890;
  --accent:    #2a2520;
  --green:     #3a7a5a;
  --green-bg:  #edf5f0;
  --green-bd:  #b8d9c8;
  --blue:      #3a5a9a;
  --blue-bg:   #edf0f8;
  --blue-bd:   #b8c8e8;
  --amber:     #8a5a1a;
  --amber-bg:  #faf3e6;
  --amber-bd:  #e8d0a0;
  --red:       #9a3a3a;
  --safe-top:  env(safe-area-inset-top);
  --safe-bot:  env(safe-area-inset-bottom);
  --font-mono: 'DM Mono', ui-monospace, monospace;
  --font-disp: 'Syne', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 13px;
  overscroll-behavior: none;
}

/* ══════════════════════════════
   MOBILE layout (default)
══════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding-top: var(--safe-top);
}

/* ══════════════════════════════
   PC layout (≥ 900px)
══════════════════════════════ */
@media (min-width: 900px) {
  .app {
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }
  header { flex-shrink: 0; }
  .pc-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .col-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
    background: var(--ink);
  }
  .col-right {
    width: 340px;
    flex-shrink: 0;
    overflow-y: auto;
    background: var(--bg);
  }
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
header {
  display: flex;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0;
}
.logo {
  font-family: var(--font-disp);
  font-weight: 800;
  font-size: 17px;
  letter-spacing: 0.06em;
  color: var(--ink);
  padding: 13px 22px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}
.logo em { color: var(--ink3); font-style: normal; font-size: 10px; font-family: var(--font-mono); font-weight: 400; margin-left: 6px; letter-spacing: 0.1em; }
.url-area {
  flex: 1;
  display: flex;
  align-items: center;
  min-width: 0;
}
.url-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 13px 16px;
  outline: none;
  min-width: 0;
}
.url-input::placeholder { color: var(--ink3); }
.load-btn {
  background: var(--ink);
  border: none;
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  padding: 13px 22px;
  cursor: pointer;
  white-space: nowrap;
  border-left: 1px solid var(--border);
  transition: background 0.15s;
  flex-shrink: 0;
}
.load-btn:hover { background: var(--ink2); }

/* ══════════════════════════════
   PC BODY WRAPPER (mobile: none)
══════════════════════════════ */
.pc-body {
  display: contents; /* mobile: 無効 */
}
@media (min-width: 900px) {
  .pc-body { display: flex; }
}

/* ══════════════════════════════
   LEFT COL (Player)
══════════════════════════════ */
.col-left {
  background: var(--ink);
}

/* mobile: playerはfull width */
.player-wrap {
  position: relative;
  background: #111;
  width: 100%;
}
.player-wrap::after { content: ''; display: block; padding-top: 56.25%; }
#player { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: #555;
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
}
.placeholder-icon {
  width: 52px; height: 52px;
  border: 1px solid #333;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #444;
}

/* PC: player fills remaining height */
@media (min-width: 900px) {
  .col-left { flex: 1; }
  .player-wrap {
    flex: 1;
    /* 高さをcolumn内で埋める */
    position: relative;
  }
  .player-wrap::after { display: none; }
  .col-left {
    display: flex;
    flex-direction: column;
  }
  .player-wrap {
    flex: 1;
    min-height: 0;
  }
  #player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  /* player-wrap needs position:relative always */
  .player-wrap { position: relative; }
}

/* ══════════════════════════════
   RIGHT COL (Controls)
   Mobile: stacked below player
══════════════════════════════ */
.col-right {
  background: var(--bg);
}

/* ── section ── */
.section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.section:last-child { border-bottom: none; }

.sec-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── skip chips ── */
.chip-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin-bottom: 5px;
}
.chip {
  padding: 7px 0;
  border-radius: 6px;
  border: 1px solid;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.1s;
}
.chip:active { transform: scale(0.93); }
.chip.back { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }
.chip.fwd  { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
.chip.back:hover { background: #dde5f5; }
.chip.fwd:hover  { background: #daeee5; }

.custom-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 5px;
  margin-top: 8px;
}
.custom-row input[type=number] {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 7px 10px;
  text-align: center;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}
.custom-row input:focus { border-color: var(--border2); }
.ibtn {
  padding: 7px 13px;
  border-radius: 6px;
  border: 1px solid;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.1s;
}
.ibtn:active { transform: scale(0.95); }
.ibtn.back { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }
.ibtn.fwd  { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }

/* ── loop ── */
.loop-btns {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 5px;
  margin-bottom: 7px;
}
.lbtn {
  padding: 9px 0;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.lbtn:hover { background: var(--bg2); }
.lbtn.active { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }
.lbtn:active { transform: scale(0.95); }
.clr-btn {
  padding: 9px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink3);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.clr-btn:hover { border-color: #d4a0a0; color: var(--red); background: #fdf0f0; }

.loop-status {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2);
  font-size: 11px;
  color: var(--ink3);
  min-height: 34px;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}
.loop-status.on { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }
.loop-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: all 0.3s; }
.loop-status.on .loop-dot { background: var(--amber); animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── speed ── */
.speed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.speed-lbl { font-size: 10px; color: var(--ink3); width: 26px; text-align: center; }
.speed-val { font-size: 13px; font-weight: 500; color: var(--ink); width: 32px; text-align: right; flex-shrink: 0; }
input[type=range]#speed-range {
  flex: 1; -webkit-appearance: none;
  height: 3px; background: var(--bg3); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]#speed-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--ink); border: 2px solid var(--bg); outline: 1px solid var(--border2);
}
.speed-presets { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; }
.speed-chip {
  padding: 6px 0; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--ink3);
  font-family: var(--font-mono); font-size: 10px; cursor: pointer; text-align: center;
  transition: all 0.12s;
}
.speed-chip:hover { background: var(--bg2); color: var(--ink); }
.speed-chip.active { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); font-weight: 500; }
.speed-chip:active { transform: scale(0.93); }

/* ── flags ── */
.flag-add-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.flag-name-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}
.flag-name-input::placeholder { color: var(--ink3); }
.flag-name-input:focus { border-color: var(--border2); }
.flag-add-btn {
  background: var(--ink);
  border: none;
  border-radius: 6px;
  color: var(--bg);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 8px 14px;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.06em;
  transition: background 0.15s;
  flex-shrink: 0;
}
.flag-add-btn:hover { background: var(--ink2); }
.flag-add-btn:active { transform: scale(0.96); }

#flag-list { display: flex; flex-direction: column; gap: 5px; }
.flag-item {
  display: flex;
  align-items: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.15s;
  cursor: pointer;
}
.flag-item:hover { border-color: var(--border2); }
.flag-time {
  font-size: 12px; font-weight: 500;
  padding: 9px 12px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  color: var(--ink);
  white-space: nowrap;
  min-width: 54px;
  text-align: center;
  flex-shrink: 0;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}
.flag-item:hover .flag-time { background: var(--ink); color: var(--bg); }
.flag-label {
  flex: 1; padding: 9px 12px;
  font-size: 12px; color: var(--ink2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.flag-del {
  padding: 9px 12px;
  background: none; border: none;
  border-left: 1px solid var(--border);
  color: var(--ink3); font-size: 13px;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.flag-del:hover { background: #fdf0f0; color: var(--red); }
.flag-empty {
  padding: 20px; text-align: center;
  color: var(--ink3); font-size: 11px; letter-spacing: 0.1em;
  background: var(--bg2); border-radius: 8px; border: 1px dashed var(--border);
}

/* ── toast ── */
#toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bot));
  left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--ink); color: var(--bg);
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
  padding: 8px 18px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap; z-index: 1000;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">TIMESHIFT <em>v3</em></div>
    <div class="url-area">
      <input class="url-input" id="url-input" type="url"
        placeholder="YouTube URL を貼り付けて Enter …" autocomplete="off" spellcheck="false">
      <button class="load-btn" id="load-btn">LOAD</button>
    </div>
  </header>

  <!-- PC: left/right columns; Mobile: stacked -->
  <div class="pc-body">

    <!-- LEFT: Player -->
    <div class="col-left">
      <div class="player-wrap">
        <div class="placeholder" id="placeholder">
          <div class="placeholder-icon">▶</div>
          <div>URL を入力して読み込む</div>
        </div>
        <div id="player" style="display:none"></div>
      </div>
    </div>

    <!-- RIGHT: Controls -->
    <div class="col-right">

      <!-- SKIP -->
      <div class="section">
        <div class="sec-label">REWIND</div>
        <div class="chip-grid" id="back-chips"></div>
        <div class="sec-label" style="margin-top:10px">FORWARD</div>
        <div class="chip-grid" id="fwd-chips"></div>
        <div class="custom-row">
          <input type="number" id="custom-sec" value="5" min="1" max="600">
          <button class="ibtn back" id="custom-back">◀ 戻す</button>
          <button class="ibtn fwd"  id="custom-fwd">進む ▶</button>
        </div>
      </div>

      <!-- LOOP -->
      <div class="section">
        <div class="sec-label">A–B LOOP</div>
        <div class="loop-btns">
          <button class="lbtn" id="btn-a">[ A ] 開始点</button>
          <button class="lbtn" id="btn-b">[ B ] 終了点</button>
          <button class="clr-btn" id="btn-clr">✕</button>
        </div>
        <div class="loop-status" id="loop-status">
          <div class="loop-dot"></div>
          <span id="loop-text">未設定</span>
        </div>
      </div>

      <!-- SPEED -->
      <div class="section">
        <div class="sec-label">PLAYBACK RATE</div>
        <div class="speed-row">
          <span class="speed-lbl">0.25</span>
          <input type="range" id="speed-range" min="0.25" max="3" step="0.05" value="1">
          <span class="speed-lbl">3.0</span>
          <span class="speed-val" id="speed-val">1×</span>
        </div>
        <div class="speed-presets" id="speed-presets"></div>
      </div>

      <!-- FLAGS -->
      <div class="section">
        <div class="sec-label">FLAGS</div>
        <div class="flag-add-row">
          <input class="flag-name-input" id="flag-name" placeholder="ラベル（任意）" maxlength="40">
          <button class="flag-add-btn" id="flag-add">＋ FLAG</button>
        </div>
        <div id="flag-list">
          <div class="flag-empty" id="flag-empty">フラグはまだありません</div>
        </div>
      </div>

    </div><!-- /col-right -->
  </div><!-- /pc-body -->
</div><!-- /app -->

<div id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const SKIP_SECS     = [5, 10, 15, 20, 30];
const SPEED_PRESETS = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
let player = null, playerReady = false;
let loopStart = null, loopEnd = null, loopTimer = null;
let flags = [];

function onYouTubeIframeAPIReady() {}

function extractVideoId(url) {
  try {
    const u = new URL(url.trim());
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
    return u.searchParams.get('v');
  } catch { return null; }
}

function loadVideo(url) {
  const vid = extractVideoId(url);
  if (!vid) { showToast('有効な YouTube URL を入力してください'); return; }
  document.getElementById('placeholder').style.display = 'none';
  const el = document.getElementById('player');
  el.style.display = 'block';
  flags = []; renderFlags(); clearLoop();
  if (player) { player.loadVideoById(vid); return; }
  player = new YT.Player('player', {
    videoId: vid,
    playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
    events: {
      onReady()         { playerReady = true; },
      onStateChange(e)  { if (e.data === YT.PlayerState.ENDED) clearLoop(); }
    }
  });
}

function skip(sec) {
  if (!playerReady) { showToast('先に動画を読み込んでください'); return; }
  player.seekTo(Math.max(0, Math.min(player.getDuration(), player.getCurrentTime() + sec)), true);
}

function fmt(s) {
  if (s === null) return '–:––';
  const m = Math.floor(s / 60), sc = Math.floor(s % 60);
  return `${m}:${String(sc).padStart(2,'0')}`;
}

function updateLoopStatus() {
  const el = document.getElementById('loop-status');
  const tx = document.getElementById('loop-text');
  if (loopStart !== null && loopEnd !== null) {
    el.className = 'loop-status on';
    tx.textContent = `LOOP  ${fmt(loopStart)} → ${fmt(loopEnd)}`;
  } else if (loopStart !== null) {
    el.className = 'loop-status';
    tx.textContent = `A: ${fmt(loopStart)}  ·  B: 未設定`;
  } else {
    el.className = 'loop-status';
    tx.textContent = '未設定';
  }
}

function startLoop() {
  if (loopTimer) clearInterval(loopTimer);
  loopTimer = setInterval(() => {
    if (!player || loopStart === null || loopEnd === null) return;
    const t = player.getCurrentTime();
    if (t >= loopEnd || t < loopStart) player.seekTo(loopStart, true);
  }, 200);
}

function clearLoop() {
  loopStart = loopEnd = null;
  if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
  document.getElementById('btn-a').classList.remove('active');
  document.getElementById('btn-b').classList.remove('active');
  updateLoopStatus();
}

function setSpeed(rate) {
  if (player && playerReady) player.setPlaybackRate(rate);
  document.getElementById('speed-val').textContent =
    rate.toFixed(2).replace(/\.?0+$/, '') + '×';
  document.getElementById('speed-range').value = rate;
  document.querySelectorAll('.speed-chip').forEach(c =>
    c.classList.toggle('active', parseFloat(c.dataset.rate) === rate)
  );
}

function addFlag() {
  if (!playerReady) { showToast('先に動画を読み込んでください'); return; }
  const t    = player.getCurrentTime();
  const name = document.getElementById('flag-name').value.trim() || fmt(t);
  flags.push({ t, name });
  flags.sort((a, b) => a.t - b.t);
  document.getElementById('flag-name').value = '';
  renderFlags();
  showToast(`🏁 ${fmt(t)}  ${name}`);
}

function renderFlags() {
  const list = document.getElementById('flag-list');
  list.querySelectorAll('.flag-item').forEach(el => el.remove());
  const empty = document.getElementById('flag-empty');
  if (flags.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  flags.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'flag-item';
    item.innerHTML = `
      <div class="flag-time">${fmt(f.t)}</div>
      <div class="flag-label">${f.name}</div>
      <button class="flag-del" title="削除">✕</button>`;
    item.querySelector('.flag-time').addEventListener('click', () => player.seekTo(f.t, true));
    item.querySelector('.flag-label').addEventListener('click', () => player.seekTo(f.t, true));
    item.querySelector('.flag-del').addEventListener('click', e => {
      e.stopPropagation(); flags.splice(i, 1); renderFlags();
    });
    list.appendChild(item);
  });
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* chip生成 */
SKIP_SECS.forEach(s => {
  const b = document.createElement('button');
  b.className = 'chip back'; b.textContent = `-${s}`;
  b.addEventListener('click', () => skip(-s));
  document.getElementById('back-chips').appendChild(b);
  const f = document.createElement('button');
  f.className = 'chip fwd'; f.textContent = `+${s}`;
  f.addEventListener('click', () => skip(s));
  document.getElementById('fwd-chips').appendChild(f);
});

SPEED_PRESETS.forEach(r => {
  const c = document.createElement('button');
  c.className = 'speed-chip'; c.textContent = `${r}×`;
  c.dataset.rate = r;
  if (r === 1.0) c.classList.add('active');
  c.addEventListener('click', () => setSpeed(r));
  document.getElementById('speed-presets').appendChild(c);
});

/* events */
document.getElementById('load-btn').addEventListener('click', () =>
  loadVideo(document.getElementById('url-input').value));
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadVideo(e.target.value);
});
document.getElementById('custom-back').addEventListener('click', () =>
  skip(-(parseFloat(document.getElementById('custom-sec').value) || 5)));
document.getElementById('custom-fwd').addEventListener('click', () =>
  skip(parseFloat(document.getElementById('custom-sec').value) || 5));
document.getElementById('btn-a').addEventListener('click', () => {
  if (!playerReady) { showToast('先に動画を読み込んでください'); return; }
  loopStart = player.getCurrentTime();
  if (loopEnd !== null && loopEnd <= loopStart) {
    loopEnd = null; document.getElementById('btn-b').classList.remove('active');
  }
  document.getElementById('btn-a').classList.add('active');
  updateLoopStatus();
  if (loopEnd !== null) startLoop();
});
document.getElementById('btn-b').addEventListener('click', () => {
  if (!playerReady) { showToast('先に動画を読み込んでください'); return; }
  if (loopStart === null) { showToast('先に [A] 開始点を設定してください'); return; }
  const t = player.getCurrentTime();
  if (t <= loopStart) { showToast('終了点は開始点より後にしてください'); return; }
  loopEnd = t;
  document.getElementById('btn-b').classList.add('active');
  updateLoopStatus(); startLoop();
});
document.getElementById('btn-clr').addEventListener('click', clearLoop);
document.getElementById('speed-range').addEventListener('input', e =>
  setSpeed(parseFloat(e.target.value)));
document.getElementById('flag-add').addEventListener('click', addFlag);
document.getElementById('flag-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFlag();
});

document.addEventListener('keydown', e => {
  if (['INPUT'].includes(document.activeElement?.tagName)) return;
  const sec = parseFloat(document.getElementById('custom-sec').value) || 5;
  if (e.altKey) {
    if (e.key === 'j') { skip(-sec); e.preventDefault(); }
    if (e.key === 'l') { skip(sec);  e.preventDefault(); }
    if (e.key === 'a') { document.getElementById('btn-a').click(); e.preventDefault(); }
    if (e.key === 'b') { document.getElementById('btn-b').click(); e.preventDefault(); }
    if (e.key === 'f') { addFlag(); e.preventDefault(); }
  }
});

document.getElementById('url-input').addEventListener('focus', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if ((text.includes('youtube.com') || text.includes('youtu.be'))
        && !document.getElementById('url-input').value) {
      document.getElementById('url-input').value = text;
    }
  } catch {}
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
